<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>حاسبة التداول</title>
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#111827;
      --card:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.14);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#3b82f6;
      --shadow:0 20px 50px rgba(0,0,0,.30);
      --radius:24px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    html{font-size:16px}

    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
      background:
        radial-gradient(circle at top right, #1d4ed8 0%, transparent 28%),
        radial-gradient(circle at bottom left, #059669 0%, transparent 24%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      color:var(--text);
      display:grid;
      place-items:center;
      padding:20px;
    }

    .wrap{width:100%;max-width:460px}

    .card{
      background:var(--card);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
    }

    h1{
      margin:0 0 8px;
      text-align:center;
      font-size:1.6rem;
      font-weight:800;
    }

    .sub{
      margin:0 0 18px;
      text-align:center;
      color:var(--muted);
      line-height:1.7;
      font-size:.96rem;
    }

    .modes{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:18px;
    }

    .mode-btn{
      border:none;
      border-radius:14px;
      padding:13px 10px;
      font-size:.95rem;
      font-weight:800;
      cursor:pointer;
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    .mode-btn.active{
      background:linear-gradient(135deg,#3b82f6,#2563eb);
    }

    .field{margin-bottom:14px}

    label{
      display:block;
      margin-bottom:8px;
      font-size:.95rem;
      font-weight:700;
      color:#e2e8f0;
    }

    input{
      width:100%;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      color:var(--text);
      border-radius:16px;
      padding:16px 14px;
      font-size:16px;
      outline:none;
      transition:.2s ease;
    }

    input::placeholder{color:#94a3b8}

    input:focus{
      border-color:#60a5fa;
      background:rgba(255,255,255,.12);
      box-shadow:0 0 0 4px rgba(96,165,250,.18);
    }

    .hidden{display:none}

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:18px;
    }

    button.action{
      border:none;
      border-radius:16px;
      padding:15px 14px;
      font-size:1rem;
      font-weight:800;
      cursor:pointer;
      transition:transform .08s ease, opacity .2s ease;
    }

    button.action:active{transform:scale(.98)}

    .calc{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
    .reset{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.12)}

    .result{
      margin-top:18px;
      padding:18px;
      border-radius:20px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      display:grid;
      gap:10px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .row span:first-child{color:var(--muted);font-size:.95rem}
    .value{font-weight:800;font-size:1.05rem}
    .profit-positive{color:#86efac}
    .profit-negative{color:#fca5a5}

    .error{
      min-height:22px;
      margin-top:12px;
      text-align:center;
      color:#fecaca;
      font-size:.92rem;
    }

    .hint{
      margin-top:12px;
      text-align:center;
      color:#cbd5e1;
      font-size:.88rem;
      line-height:1.7;
    }

    @media (max-width:420px){
      .card{padding:18px;border-radius:20px}
      h1{font-size:1.4rem}
      .actions,.modes{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>حاسبة التداول</h1>
      <p class="sub">احسب الربح من سعر الدخول وسعر البيع، أو احسب سعر البيع المتوقع من نسبة الربح.</p>

      <div class="modes">
        <button class="mode-btn active" id="modeSellBtn" onclick="setMode('sell')">سعر الدخول + سعر البيع</button>
        <button class="mode-btn" id="modePercentBtn" onclick="setMode('percent')">سعر الدخول + نسبة الربح</button>
      </div>

      <div class="field">
        <label for="entry">سعر الدخول</label>
        <input id="entry" type="text" inputmode="decimal" placeholder="مثال: 10.77" />
      </div>

      <div class="field" id="sellField">
        <label for="sell">سعر البيع</label>
        <input id="sell" type="text" inputmode="decimal" placeholder="مثال: 10.96" />
      </div>

      <div class="field hidden" id="percentField">
        <label for="percent">نسبة الربح %</label>
        <input id="percent" type="text" inputmode="decimal" placeholder="مثال: 1.72" />
      </div>

      <div class="actions">
        <button class="action calc" onclick="calculate()">احسب</button>
        <button class="action reset" onclick="resetForm()">إعادة تعيين</button>
      </div>

      <div class="error" id="error"></div>

      <div class="result">
        <div class="row">
          <span>الربح / الخسارة</span>
          <span class="value" id="profitAmount">0.00</span>
        </div>
        <div class="row">
          <span>نسبة الربح / الخسارة</span>
          <span class="value" id="profitPercent">0.00%</span>
        </div>
        <div class="row">
          <span>سعر البيع النهائي</span>
          <span class="value" id="finalSell">0.00</span>
        </div>
      </div>

      <div class="hint">مثال: دخول 10.77 وبيع 10.96 يعطي ربحًا يقارب 0.19 ونسبة تقارب 1.76%.</div>
    </div>
  </div>

  <script>
    let mode = "sell";

    const entry = document.getElementById("entry");
    const sell = document.getElementById("sell");
    const percent = document.getElementById("percent");

    const sellField = document.getElementById("sellField");
    const percentField = document.getElementById("percentField");

    const modeSellBtn = document.getElementById("modeSellBtn");
    const modePercentBtn = document.getElementById("modePercentBtn");

    const errorBox = document.getElementById("error");
    const profitAmount = document.getElementById("profitAmount");
    const profitPercent = document.getElementById("profitPercent");
    const finalSell = document.getElementById("finalSell");

    function normalizeNumber(value) {
      return parseFloat(String(value).replace(/,/g, ".").trim());
    }

    function setMode(newMode) {
      mode = newMode;
      errorBox.textContent = "";

      if (mode === "sell") {
        sellField.classList.remove("hidden");
        percentField.classList.add("hidden");
        modeSellBtn.classList.add("active");
        modePercentBtn.classList.remove("active");
      } else {
        sellField.classList.add("hidden");
        percentField.classList.remove("hidden");
        modeSellBtn.classList.remove("active");
        modePercentBtn.classList.add("active");
      }

      clearResults();
    }

    function clearResults() {
      profitAmount.textContent = "0.00";
      profitAmount.className = "value";
      profitPercent.textContent = "0.00%";
      profitPercent.className = "value";
      finalSell.textContent = "0.00";
    }

    function calculate() {
      const entryPrice = normalizeNumber(entry.value);

      if (isNaN(entryPrice) || entryPrice <= 0) {
        errorBox.textContent = "أدخل سعر دخول صحيح أكبر من صفر.";
        clearResults();
        return;
      }

      if (mode === "sell") {
        const sellPrice = normalizeNumber(sell.value);

        if (isNaN(sellPrice) || sellPrice < 0) {
          errorBox.textContent = "أدخل سعر بيع صحيح.";
          clearResults();
          return;
        }

        const profit = sellPrice - entryPrice;
        const percentValue = (profit / entryPrice) * 100;

        profitAmount.textContent = profit.toFixed(4);
        profitPercent.textContent = percentValue.toFixed(2) + "%";
        finalSell.textContent = sellPrice.toFixed(4);

        profitAmount.className = "value " + (profit >= 0 ? "profit-positive" : "profit-negative");
        profitPercent.className = "value " + (percentValue >= 0 ? "profit-positive" : "profit-negative");
      } else {
        const profitPct = normalizeNumber(percent.value);

        if (isNaN(profitPct)) {
          errorBox.textContent = "أدخل نسبة ربح صحيحة.";
          clearResults();
          return;
        }

        const profit = entryPrice * (profitPct / 100);
        const sellPrice = entryPrice + profit;

        profitAmount.textContent = profit.toFixed(4);
        profitPercent.textContent = profitPct.toFixed(2) + "%";
        finalSell.textContent = sellPrice.toFixed(4);

        profitAmount.className = "value " + (profit >= 0 ? "profit-positive" : "profit-negative");
        profitPercent.className = "value " + (profitPct >= 0 ? "profit-positive" : "profit-negative");
      }

      errorBox.textContent = "";
    }

    function resetForm() {
      entry.value = "";
      sell.value = "";
      percent.value = "";
      errorBox.textContent = "";
      clearResults();
      entry.focus();
    }

    entry.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        if (mode === "sell") sell.focus();
        else percent.focus();
      }
    });

    sell.addEventListener("keydown", e => {
      if (e.key === "Enter") calculate();
    });

    percent.addEventListener("keydown", e => {
      if (e.key === "Enter") calculate();
    });
  </script>
</body>
</html>
