<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>حاسبة الربح</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.14);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --accent2: #16a34a;
      --danger: #ef4444;
      --shadow: 0 20px 50px rgba(0,0,0,0.30);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      font-size: 16px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at top right, #1d4ed8 0%, transparent 28%),
        radial-gradient(circle at bottom left, #059669 0%, transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      text-align: center;
      font-size: 0.98rem;
      line-height: 1.7;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: #e2e8f0;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-radius: 16px;
      padding: 16px 14px;
      font-size: 16px;
      outline: none;
      transition: 0.2s ease;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      border-color: #60a5fa;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 0 4px rgba(96,165,250,0.18);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 15px 14px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease, background 0.2s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .calc-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    .reset-btn {
      background: rgba(255,255,255,0.10);
      color: white;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .result {
      margin-top: 18px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      display: grid;
      gap: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .row span:first-child {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .value {
      font-weight: 800;
      font-size: 1.08rem;
    }

    .total {
      color: #86efac;
      font-size: 1.3rem;
    }

    .hint {
      margin-top: 12px;
      font-size: 0.88rem;
      color: #cbd5e1;
      text-align: center;
      line-height: 1.7;
    }

    .error {
      color: #fecaca;
      text-align: center;
      margin-top: 12px;
      font-size: 0.92rem;
      min-height: 22px;
    }

    @media (max-width: 420px) {
      .card {
        padding: 18px;
        border-radius: 20px;
      }

      .title {
        font-size: 1.4rem;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">حاسبة الربح</h1>
      <p class="subtitle">أدخل مبلغ الدخول ونسبة الربح، وسيتم حساب الربح والمجموع النهائي مباشرة.</p>

      <div class="field">
        <label for="amount">قيمة الدخول بالدولار</label>
        <input id="amount" type="text" inputmode="decimal" placeholder="مثال: 10.77" />
      </div>

      <div class="field">
        <label for="profit">نسبة الربح %</label>
        <input id="profit" type="text" inputmode="decimal" placeholder="مثال: 1.72" />
      </div>

      <div class="actions">
        <button class="calc-btn" onclick="calculate()">احسب الآن</button>
        <button class="reset-btn" onclick="resetForm()">إعادة تعيين</button>
      </div>

      <div class="error" id="error"></div>

      <div class="result">
        <div class="row">
          <span>قيمة الربح</span>
          <span class="value" id="profitValue">0.00 $</span>
        </div>
        <div class="row">
          <span>المجموع النهائي</span>
          <span class="value total" id="totalValue">0.00 $</span>
        </div>
      </div>

      <div class="hint">مثال: 10.77 مع ربح 1.72% = 10.96 دولار تقريبًا.</div>
    </div>
  </div>

  <script>
    const amountInput = document.getElementById("amount");
    const profitInput = document.getElementById("profit");
    const profitValue = document.getElementById("profitValue");
    const totalValue = document.getElementById("totalValue");
    const errorBox = document.getElementById("error");

    function normalizeNumber(value) {
      return parseFloat(String(value).replace(/,/g, ".").trim());
    }

    function calculate() {
      const amount = normalizeNumber(amountInput.value);
      const profit = normalizeNumber(profitInput.value);

      if (isNaN(amount) || isNaN(profit) || amount < 0) {
        errorBox.textContent = "فضلاً أدخل أرقامًا صحيحة في الحقول.";
        profitValue.textContent = "0.00 $";
        totalValue.textContent = "0.00 $";
        return;
      }

      const earned = amount * (profit / 100);
      const total = amount + earned;

      profitValue.textContent = earned.toFixed(2) + " $";
      totalValue.textContent = total.toFixed(2) + " $";
      errorBox.textContent = "";
    }

    function resetForm() {
      amountInput.value = "";
      profitInput.value = "";
      profitValue.textContent = "0.00 $";
      totalValue.textContent = "0.00 $";
      errorBox.textContent = "";
      amountInput.focus();
    }

    amountInput.addEventListener("keydown", e => {
      if (e.key === "Enter") profitInput.focus();
    });

    profitInput.addEventListener("keydown", e => {
      if (e.key === "Enter") calculate();
    });
  </script>
</body>
</html>
